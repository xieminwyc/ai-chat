services:
  ai-chat:
    # 线上镜像地址：CI 构建后推送到 GHCR，服务器从这里 pull
    # 本地测试时可临时改成 ai-chat:local
    image: ghcr.io/xieminwyc/ai-chat:latest
    # 容器崩溃自动重启，除非手动执行 docker compose stop
    restart: unless-stopped
    ports:
      # 宿主机端口:容器端口，外部通过 3000 访问容器内的 3000
      - "3000:3000"
    env_file:
      # 从服务器本地的 .env.production 注入真实数据库密钥和 AI 密钥
      - .env.production
    healthcheck:
      # 每隔一段时间请求这个接口，能通则认为应用健康
      test:
        ["CMD", "wget", "-qO-", "http://localhost:3000/api/chat?action=health"]
      interval: 30s # 每 30 秒检查一次
      timeout: 10s # 超过 10 秒没响应算失败
      retries: 3 # 连续失败 3 次才标记为 unhealthy
      start_period: 10s # 启动后等 10 秒再开始检查（留时间给应用初始化）
