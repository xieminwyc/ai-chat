# 这个 workflow 负责：代码检查 + 测试 + 构建 Docker 镜像并推送到 GHCR
name: CI

on:
  # 提交 PR 到 main 时，自动跑一遍检查。
  pull_request:
    branches:
      - main
  # 代码真的 push 到 main 时，也要再跑一遍，作为部署前的最后校验。
  push:
    branches:
      - main

jobs:
  verify:
    # GitHub 提供的 Ubuntu 运行环境。
    runs-on: ubuntu-latest
    env:
      # 标记当前运行在 CI 环境中。
      CI: true
      # 这些是给 lint/test 用的占位值，不是真实线上密钥。
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ai_chat_app
      SILICONFLOW_API_KEY: test-key
      SILICONFLOW_BASE_URL: https://api.siliconflow.cn/v1
      SILICONFLOW_MODEL: Qwen/Qwen2.5-7B-Instruct
    steps:
      # 把仓库代码拉到当前 runner 里。
      - name: Check out repository
        uses: actions/checkout@v6

      # 安装指定版本的 Node.js，并开启 npm 依赖缓存。
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # 按 lockfile 安装依赖，保证 CI 环境和本地依赖版本一致。
      - name: Install dependencies
        run: npm ci

      # 先跑 lint，检查代码规范和明显错误。
      - name: Run ESLint
        run: npm run lint

      # 再跑测试，确保核心逻辑没有回归。
      - name: Run tests
        run: npm run test

  build-and-push:
    # lint/test 全部通过后才构建镜像，避免推出有问题的镜像。
    needs: verify
    # PR 只跑 verify，只有真正 push 到 main 才构建并推送镜像。
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      # 登录阿里云 ACR（容器镜像服务）。
      # 需要在 GitHub Secrets 中配置 ACR_USERNAME 和 ACR_PASSWORD。
      - name: Log in to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: crpi-y387mtxqhofw4ibe.cn-guangzhou.personal.cr.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 生成镜像的 tag：latest + git commit sha（方便回溯）。
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: crpi-y387mtxqhofw4ibe.cn-guangzhou.personal.cr.aliyuncs.com/xieminwyc/ai-chat
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      # 开启 Docker Buildx，支持构建缓存和多平台。
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 构建 Docker 镜像并推送到 GHCR。
      # Dockerfile 里的占位 env 会让 build 成功；真实 env 在服务器运行时注入。
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # 利用 GitHub Actions 缓存加速后续构建（依赖层不变时直接复用）。
          cache-from: type=gha
          cache-to: type=gha,mode=max
