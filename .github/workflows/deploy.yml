# 这个 workflow 负责"自动部署到服务器"。
# 等 CI 的 build-and-push job 成功后，SSH 进服务器执行 docker compose pull/up。
name: Deploy

on:
  workflow_run:
    # 监听名为 CI 的 workflow。
    workflows:
      - CI
    # 只有当 CI 整个流程结束后，才会触发这里。
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  deploy:
    # 只允许"push 到 main 且 CI 成功"的情况触发部署。
    # PR 跑 CI 不会触发部署，只有真正合入 main 的代码才会上线。
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-latest
    steps:
      # 准备 SSH 登录服务器所需的私钥和 known_hosts。
      - name: Prepare SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -lf ~/.ssh/id_ed25519
          ssh-keyscan -p "$SERVER_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      # SSH 进服务器，执行 docker-deploy.sh。
      # 脚本负责：登录 GHCR → docker compose pull → docker compose up -d → 健康检查
      - name: Deploy on server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
            "bash /root/apps/ai-chat/scripts/docker-deploy.sh"
